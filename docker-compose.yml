services:
  # Ваш .NET бот
  tgbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-data-planner
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - DOTNET_ENVIRONMENT=Production
      # Имя хоста должно быть точно таким же, как container_name в ~/infra
      - Ollama__BaseUrl=http://ollama-ai:11434
    volumes:
      - bot-db:/app
      - ./appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - dnd-global-network
    # depends_on: ollama больше не нужен, так как ollama в другом файле
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-db:
    driver: local

networks:
  dnd-global-network:
    external: true
