services:
  # Нейросеть Qwen
  ollama:
    image: ollama/ollama
    container_name: ollama-ai
    ports:
      - "11434:11434"  # Пробрасываем порт на сервер для SSH-туннеля и локальной разработки
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - bot-network
    deploy:
      resources:
        limits:
          cpus: '1.5'  # Оставляем 0.5 ядра системе и Foundry
          memory: 2G   # Ограничение RAM, чтобы сервер не «упал»
    restart: unless-stopped

  # Ваш .NET бот
  tgbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-data-planner
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - DOTNET_ENVIRONMENT=Production
      - Ollama__BaseUrl=http://ollama:11434  # Внутри Docker-сети используем имя сервиса
    volumes:
      - bot-db:/app
      - ./appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - bot-network
    depends_on:
      - ollama
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-db:
    driver: local
  ollama-data:      # Сохраняем скачанные модели при перезапуске контейнера

networks:
  bot-network:
    driver: bridge
