services:
  # Ваш .NET бот
  tgbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-data-planner
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - DOTNET_ENVIRONMENT=Production
      - Ollama__BaseUrl=http://ollama:11434  # Внутри Docker-сети используем имя сервиса
    volumes:
      - bot-db:/app
      - ./appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - bot-network
    depends_on:
      - ollama
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-db:
    driver: local
  ollama-data:      # Сохраняем скачанные модели при перезапуске контейнера

networks:
  dnd-global-network:
    external: true
